<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>マニュアル等 | WCP Member Portal</title>
    <!-- Fonts: Shrikhand for headings, Noto Sans JP for body -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&family=Zen+Maru+Gothic:wght@400;700;900&display=swap" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div class="pop-background-pattern"></div>

    <header class="topbar">
        <div class="logo">
            <span class="pop-text">WCP</span>
            <span class="sub-logo">PORTAL</span>
        </div>
        <nav class="main-nav">
            <button class="nav-btn" data-view="home" onclick="window.location.href='index.html?view=home'"><i class="fa-solid fa-house"></i> ホーム</button>
            <button class="nav-btn" data-view="schedule" onclick="window.location.href='index.html?view=schedule'"><i class="fa-solid fa-calendar-days"></i> スケジュール</button>
            <button class="nav-btn" data-view="books" onclick="window.location.href='index.html?view=books'"><i class="fa-solid fa-book"></i> 図書管理</button>
            <button class="nav-btn" data-view="roster" onclick="window.location.href='index.html?view=roster'"><i class="fa-solid fa-users"></i> 名簿</button>
        </nav>
        <div class="user-status">
            <i class="fa-solid fa-face-smile" style="color: var(--accent-blue);"></i> 稼働中
        </div>
    </header>

    <main class="container">
        <div class="view-animate">
            <button class="cyber-btn" style="margin-bottom: 1.5rem;" onclick="window.location.href='index.html'"><i class="fa-solid fa-arrow-left"></i> ホームへ戻る</button>
            <h1 class="section-title">マニュアル</h1>
            
            <div class="typo-menu-list">
                <a href="#" target="_blank" class="typo-menu-item" style="text-decoration: none;">
                    <span class="typo-menu-index">01</span> [ 企画書の書き方 ]
                </a>
                <a href="#" target="_blank" class="typo-menu-item" style="text-decoration: none;">
                    <span class="typo-menu-index">02</span> [ メール文の書き方 ]
                </a>
                <a href="#" target="_blank" class="typo-menu-item" style="text-decoration: none;">
                    <span class="typo-menu-index">03</span> [ ツールの使い方 ]
                </a>
            </div>
            
            <div style="margin-top: 4rem; border-left: 2px solid var(--accent-blue); padding-left: 1rem;">
                <h3 style="font-family: var(--font-heading); font-size: 2rem; color: var(--text-main); margin-bottom: 0.5rem;">お知らせ</h3>
                <p style="font-family: var(--font-mono); font-size: 1rem; color: var(--text-muted); line-height: 1.6;">
                    上記リンクをクリックすると、外部のドキュメント（Google Drive等）が新しいタブで開きます。<br>
                    各ドキュメントは閲覧権限が設定されているため、アクセスできない場合は管理者に問い合わせてください。
                </p>
            </div>
        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
