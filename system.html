<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>団体制度 | WCP Member Portal</title>
    <!-- Fonts: Shrikhand for headings, Noto Sans JP for body -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&family=Zen+Maru+Gothic:wght@400;700;900&display=swap" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div class="pop-background-pattern"></div>

    <header class="topbar">
        <div class="logo">
            <span class="pop-text">WCP</span>
            <span class="sub-logo">PORTAL</span>
        </div>
        <nav class="main-nav">
            <button class="nav-btn" data-view="home" onclick="window.location.href='index.html?view=home'"><i class="fa-solid fa-house"></i> ホーム</button>
            <button class="nav-btn" data-view="schedule" onclick="window.location.href='index.html?view=schedule'"><i class="fa-solid fa-calendar-days"></i> スケジュール</button>
            <button class="nav-btn" data-view="books" onclick="window.location.href='index.html?view=books'"><i class="fa-solid fa-book"></i> 図書管理</button>
            <button class="nav-btn" data-view="roster" onclick="window.location.href='index.html?view=roster'"><i class="fa-solid fa-users"></i> 名簿</button>
        </nav>
        <div class="user-status">
            <i class="fa-solid fa-face-smile" style="color: var(--accent-blue);"></i> 稼働中
        </div>
    </header>

    <main class="container">
        <div class="view-animate">
            <button class="cyber-btn" style="margin-bottom: 1.5rem;" onclick="window.location.href='index.html'"><i class="fa-solid fa-arrow-left"></i> ホームへ戻る</button>
            <h1 class="section-title">システム</h1>
            
            <div class="cyber-card" style="margin-bottom: 2rem;">
                <h2 style="font-family: var(--font-heading); font-size: 3.5rem; color: var(--accent-blue); margin-bottom: 1rem; line-height: 1;">
                    01_ カテゴリー制度
                </h2>
                <!-- 枠と見出しのみ -->
                <div style="background: #f4f4f4; border: 1px solid var(--border-color); padding: 2rem; text-align: center; font-style: italic; color: var(--text-muted); border-radius: 8px;">
                    カテゴリー制に関する詳細（準備中）
                </div>
            </div>

            <div class="cyber-card" style="margin-bottom: 2rem;">
                <h2 style="font-family: var(--font-heading); font-size: 3.5rem; color: #00ffcc; margin-bottom: 1rem; line-height: 1;">
                    02_ プロジェクト制度
                </h2>
                <!-- 枠と見出しのみ -->
                <div style="background: #f4f4f4; border: 1px solid var(--border-color); padding: 2rem; text-align: center; font-style: italic; color: var(--text-muted); border-radius: 8px;">
                    プロジェクト制に関する詳細（準備中）
                </div>
            </div>

            <div class="cyber-card">
                <h2 style="font-family: var(--font-heading); font-size: 3.5rem; color: var(--accent-yellow); margin-bottom: 1rem; line-height: 1;">
                    03_ アワード
                </h2>
                <!-- 枠と見出しのみ -->
                <div style="background: #f4f4f4; border: 1px solid var(--border-color); padding: 2rem; text-align: center; font-style: italic; color: var(--text-muted); border-radius: 8px;">
                    アワードに関する詳細（準備中）
                </div>
            </div>
        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
